<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 2000px;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }
        section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <section style="background: lightblue;">Section 1</section>
    <section style="background: lightgreen;">Section 2</section>
    <section style="background: lightcoral;">Section 3</section>
    <div id="countdown"></div>
    <script>
        const countdownDate = new Date('2026-04-14T17:30:11Z').getTime();
        const countdownElement = document.getElementById('countdown');
        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s `;
            if (distance < 0) {
                clearInterval(x);
                countdownElement.innerHTML = 'EXPIRED';
            }
        };
        updateCountdown();
        const x = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
