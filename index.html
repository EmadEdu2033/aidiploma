<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body {
            overflow-y: scroll;
        }
        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
        }

        /* FIX 1 — Scroll-Pinned Intro Sentences */
        #intro-pin-section {
            height: 500vh;
            position: relative;
            display: block;
        }
        .intro-pin-inner {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .intro-sentence {
            position: absolute;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        .intro-sentence.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* FIX 2 — Scroll-Pinned Stacking Cards */
        #cards-pin-section {
            height: calc((var(--card-count, 5) * 150px) + 100vh);
            position: relative;
            display: block;
        }
        .cards-pin-inner {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cards-stack-container {
            position: relative;
            width: 90%;
            max-width: 680px;
            height: 180px;
        }
        .pain-card {
            position: absolute;
            top: 0; left: 0; right: 0;
            opacity: 0;
            transform: translateY(80px) scale(0.97);
            transition: opacity 0.5s ease, transform 0.5s ease;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>
    <section id="intro-pin-section" style="background: lightblue;">
        <div class="intro-pin-inner">
            <span class="intro-sentence">Section 1</span>
        </div>
    </section>
    <section id="cards-pin-section" style="background: lightgreen;">
        <div class="cards-pin-inner">
            <div class="cards-stack-container">
                <div class="pain-card">Section 2</div>
            </div>
        </div>
    </section>
    <section style="background: lightcoral;">Section 3</section>
    <div id="countdown"></div>
    <script>
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);
        }

        // FIX 1 — Scroll-pinned intro sentences
        (function () {
            const section = document.getElementById('intro-pin-section');
            const sentences = section.querySelectorAll('.intro-sentence');
            let currentIndex = -1;

            function showSentence(index) {
                if (index === currentIndex) return;
                sentences.forEach(function (s) { s.classList.remove('active'); });
                if (index >= 0 && index < sentences.length) {
                    sentences[index].classList.add('active');
                    currentIndex = index;
                }
            }

            function onScroll() {
                const sectionTop = section.offsetTop;
                const scrolled = window.scrollY - sectionTop;
                const sectionHeight = section.offsetHeight;
                const progress = Math.max(0, Math.min(1, scrolled / sectionHeight));
                const index = Math.min(
                    sentences.length - 1,
                    Math.floor(progress * sentences.length)
                );
                showSentence(index);
            }

            showSentence(0);
            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
        })();

        // FIX 2 — Scroll-pinned stacking cards
        (function () {
            const section = document.getElementById('cards-pin-section');
            const cards = section.querySelectorAll('.pain-card');
            let lastActiveIndex = -1;

            function updateCards(index) {
                if (index === lastActiveIndex) return;
                lastActiveIndex = index;

                cards.forEach(function (card, i) {
                    if (i < index) {
                        const stackOffset = (index - i) * 8;
                        const stackScale = 1 - (index - i) * 0.03;
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(-' + stackOffset + 'px) scale(' + stackScale + ')';
                    } else if (i === index) {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0) scale(1)';
                    } else {
                        card.style.opacity = '0';
                        card.style.transform = 'translateY(80px) scale(0.97)';
                    }
                });
            }

            function onScroll() {
                const sectionTop = section.offsetTop;
                const scrolled = window.scrollY - sectionTop;
                const sectionHeight = section.offsetHeight;
                const denominator = sectionHeight - window.innerHeight;
                const progress = denominator > 0 ? Math.max(0, Math.min(1, scrolled / denominator)) : 0;
                const index = Math.min(
                    cards.length - 1,
                    Math.floor(progress * cards.length)
                );
                updateCards(index);
            }

            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
        })();

        const countdownDate = new Date('2026-04-14T17:30:11Z').getTime();
        const countdownElement = document.getElementById('countdown');
        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s `;
            if (distance < 0) {
                clearInterval(x);
                countdownElement.innerHTML = 'EXPIRED';
            }
        };
        updateCountdown();
        const x = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
